<svg xmlns="http://www.w3.org/2000/svg">
<defs>
<!-- ==========================================
     GAMEMAKER ICON SPRITE
     Clean minimal line icons, 24x24 viewBox
     stroke-based, currentColor
     ========================================== -->

<!-- TOOLBAR ICONS -->

<!-- pencil: draw tool -->
<symbol id="icon-pencil" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
  <path d="M15 5l4 4"/>
</symbol>

<!-- bucket: fill tool -->
<symbol id="icon-bucket" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M3.5 13.5L10.5 6.5a1 1 0 0 1 1.41 0l5.09 5.09a1 1 0 0 1 0 1.41L9.5 20.5 2 22l1.5-8.5z"/>
  <path d="M6 4l4 4"/>
  <path d="M19 16s3 2 3 4a3 3 0 0 1-6 0c0-2 3-4 3-4z"/>
</symbol>

<!-- eraser: erase tool -->
<symbol id="icon-eraser" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M7 21h10"/>
  <path d="M19.07 7.07L10.5 15.64a2 2 0 0 1-2.83 0L4.93 12.9a2 2 0 0 1 0-2.83L13.5 1.5a2 2 0 0 1 2.83 0l2.74 2.74a2 2 0 0 1 0 2.83z"/>
</symbol>

<!-- move: four-directional arrows -->
<symbol id="icon-move" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <polyline points="5 9 2 12 5 15"/>
  <polyline points="9 5 12 2 15 5"/>
  <polyline points="15 19 12 22 9 19"/>
  <polyline points="19 9 22 12 19 15"/>
  <line x1="2" y1="12" x2="22" y2="12"/>
  <line x1="12" y1="2" x2="12" y2="22"/>
</symbol>

<!-- undo -->
<symbol id="icon-undo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <polyline points="1 4 1 10 7 10"/>
  <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
</symbol>

<!-- redo -->
<symbol id="icon-redo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <polyline points="23 4 23 10 17 10"/>
  <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
</symbol>

<!-- play -->
<symbol id="icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <polygon points="5 3 19 12 5 21 5 3"/>
</symbol>


<!-- FILE MENU ICONS -->

<!-- save: floppy disk -->
<symbol id="icon-save" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
  <polyline points="17 21 17 13 7 13 7 21"/>
  <polyline points="7 3 7 8 15 8"/>
</symbol>

<!-- share: upload from box -->
<symbol id="icon-share" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
  <polyline points="16 6 12 2 8 6"/>
  <line x1="12" y1="2" x2="12" y2="15"/>
</symbol>

<!-- reload: circular arrows -->
<symbol id="icon-reload" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <polyline points="23 4 23 10 17 10"/>
  <polyline points="1 20 1 14 7 14"/>
  <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/>
  <path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/>
</symbol>

<!-- package: 3D box -->
<symbol id="icon-package" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
  <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
  <line x1="12" y1="22.08" x2="12" y2="12"/>
</symbol>


<!-- EDIT MENU ICONS -->

<!-- fill-down: arrow down to bottom line -->
<symbol id="icon-fill-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <line x1="12" y1="3" x2="12" y2="15"/>
  <polyline points="8 11 12 15 16 11"/>
  <line x1="4" y1="21" x2="20" y2="21"/>
</symbol>

<!-- trash -->
<symbol id="icon-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <polyline points="3 6 5 6 21 6"/>
  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
</symbol>

<!-- x-circle: clear / remove -->
<symbol id="icon-x-circle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="12" cy="12" r="10"/>
  <line x1="15" y1="9" x2="9" y2="15"/>
  <line x1="9" y1="9" x2="15" y2="15"/>
</symbol>


<!-- VIEW MENU ICONS -->

<!-- zoom-in -->
<symbol id="icon-zoom-in" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="11" cy="11" r="8"/>
  <line x1="21" y1="21" x2="16.65" y2="16.65"/>
  <line x1="11" y1="8" x2="11" y2="14"/>
  <line x1="8" y1="11" x2="14" y2="11"/>
</symbol>

<!-- zoom-out -->
<symbol id="icon-zoom-out" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="11" cy="11" r="8"/>
  <line x1="21" y1="21" x2="16.65" y2="16.65"/>
  <line x1="8" y1="11" x2="14" y2="11"/>
</symbol>

<!-- zoom-reset: counter-clockwise arrow -->
<symbol id="icon-zoom-reset" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <polyline points="1 4 1 10 7 10"/>
  <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
</symbol>


<!-- GAME MENU ICONS -->

<!-- gear: settings -->
<symbol id="icon-gear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="12" cy="12" r="3"/>
  <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42m12.72-12.72l1.42-1.42"/>
</symbol>

<!-- gamepad: game controller -->
<symbol id="icon-gamepad" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="2" y="6" width="20" height="12" rx="6"/>
  <line x1="6" y1="10" x2="6" y2="14"/>
  <line x1="4" y1="12" x2="8" y2="12"/>
  <circle cx="16" cy="10" r="0.5" fill="currentColor" stroke="none"/>
  <circle cx="18" cy="12" r="0.5" fill="currentColor" stroke="none"/>
  <circle cx="16" cy="14" r="0.5" fill="currentColor" stroke="none"/>
  <circle cx="14" cy="12" r="0.5" fill="currentColor" stroke="none"/>
</symbol>

<!-- layers: stacked pages / levels -->
<symbol id="icon-layers" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <polygon points="12 2 2 7 12 12 22 7 12 2"/>
  <polyline points="2 17 12 22 22 17"/>
  <polyline points="2 12 12 17 22 12"/>
</symbol>

<!-- palette: artist palette / tile colors -->
<symbol id="icon-palette" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.1 0 2-.9 2-2 0-.53-.21-1-.55-1.36-.34-.36-.55-.83-.55-1.36 0-1.1.9-2 2-2h2.36c3.07 0 5.64-2.57 5.64-5.64C22.9 5.84 18.05 2 12 2z"/>
  <circle cx="7.5" cy="10.5" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="10.5" cy="7" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="15" cy="7" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="17.5" cy="10.5" r="1.5" fill="currentColor" stroke="none"/>
</symbol>


<!-- GAME OBJECT ICONS -->

<!-- alien: space invader / enemy -->
<symbol id="icon-alien" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M4 15V9a8 8 0 0 1 16 0v6"/>
  <path d="M4 15l-2 4h6l1-4"/>
  <path d="M20 15l2 4h-6l-1-4"/>
  <circle cx="9" cy="10" r="1" fill="currentColor" stroke="none"/>
  <circle cx="15" cy="10" r="1" fill="currentColor" stroke="none"/>
  <path d="M9 14h6"/>
</symbol>

<!-- warning: triangle with exclamation -->
<symbol id="icon-warning" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
  <line x1="12" y1="9" x2="12" y2="13"/>
  <circle cx="12" cy="17" r="0.5" fill="currentColor" stroke="none"/>
</symbol>

<!-- heart: powerups / health -->
<symbol id="icon-heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
</symbol>

<!-- flag: goal -->
<symbol id="icon-flag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
  <line x1="4" y1="22" x2="4" y2="15"/>
</symbol>

<!-- spring: zigzag with up arrow -->
<symbol id="icon-spring" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <polyline points="8 4 12 1 16 4"/>
  <line x1="12" y1="1" x2="12" y2="8"/>
  <polyline points="6 10 18 13 6 16 18 19"/>
  <line x1="6" y1="22" x2="18" y2="22"/>
</symbol>

<!-- waves: water / terrain zones -->
<symbol id="icon-waves" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M2 6c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/>
  <path d="M2 12c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/>
  <path d="M2 18c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/>
</symbol>

<!-- platform: horizontal lines -->
<symbol id="icon-platform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <line x1="3" y1="10" x2="21" y2="10"/>
  <line x1="3" y1="14" x2="21" y2="14"/>
  <polyline points="7 7 12 3 17 7"/>
  <polyline points="7 17 12 21 17 17"/>
</symbol>

<!-- question: mystery block -->
<symbol id="icon-question" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="3" y="3" width="18" height="18" rx="2"/>
  <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
  <circle cx="12" cy="17" r="0.5" fill="currentColor" stroke="none"/>
</symbol>

<!-- checkpoint: flag in ground -->
<symbol id="icon-checkpoint" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <line x1="4" y1="22" x2="4" y2="6"/>
  <path d="M4 6l10-3v8L4 14"/>
  <line x1="1" y1="22" x2="20" y2="22"/>
</symbol>

<!-- person: NPC / character -->
<symbol id="icon-person" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="12" cy="7" r="4"/>
  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
</symbol>

<!-- door -->
<symbol id="icon-door" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="4" y="2" width="16" height="20" rx="1"/>
  <path d="M9 2v20"/>
  <circle cx="15" cy="12" r="1" fill="currentColor" stroke="none"/>
</symbol>

<!-- x-mark: deselect / cancel -->
<symbol id="icon-x-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <line x1="18" y1="6" x2="6" y2="18"/>
  <line x1="6" y1="6" x2="18" y2="18"/>
</symbol>


<!-- LEFT SIDEBAR ICONS -->

<!-- image: tileset dropzone -->
<symbol id="icon-image" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
  <circle cx="8.5" cy="8.5" r="1.5"/>
  <polyline points="21 15 16 10 5 21"/>
</symbol>

<!-- lightbulb: tips / info -->
<symbol id="icon-lightbulb" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M9 18h6"/>
  <path d="M10 22h4"/>
  <path d="M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"/>
</symbol>

</defs>
</svg>
